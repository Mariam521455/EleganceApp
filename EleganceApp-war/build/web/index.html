<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Élégance • Beauté & Mode au Féminin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            color: #3a2f2a;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background: linear-gradient(135deg, #fff5f8 0%, #ffebee 50%, #ffd9e0 100%);
        }

        /* Glow rose brillant subtil et satiné */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 245, 238, 0.45) 0%, transparent 70%);
            opacity: 0.65;
            z-index: -2;
        }

        .hero {
            height: 100vh;
            min-height: 800px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 6%;
            position: relative;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.2rem, 10vw, 6.5rem);
            font-weight: 400;
            color: #d4af37;
            letter-spacing: 6px;
            margin-bottom: 0.8em;
            text-shadow: 0 4px 25px rgba(212, 175, 55, 0.25);
            opacity: 0;
            animation: fadeIn 2s ease-out forwards;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 6vw, 4.2rem);
            font-weight: 400;
            color: #3a2f2a;
            line-height: 1.1;
            margin-bottom: 0.6em;
            text-shadow: 0 3px 20px rgba(0,0,0,0.2);
            opacity: 0;
            animation: fadeInUp 1.8s ease-out 0.6s forwards;
        }

        .subtitle {
            font-size: clamp(1.1rem, 3.5vw, 1.45rem);
            color: #5c4438;
            max-width: 680px;
            line-height: 1.55;
            margin-bottom: 3.5rem;
            text-shadow: 0 2px 15px rgba(0,0,0,0.15);
            opacity: 0;
            animation: fadeInUp 1.8s ease-out 1s forwards;
        }

        /* Icônes fines, élégantes et harmonisées (beige doré / champagne) */
        .floating-icon {
            position: absolute;
            width: 70px;
            height: auto;
            opacity: 0.78;
            filter: drop-shadow(0 8px 20px rgba(212, 175, 55, 0.18));
            animation: floatIcon 14s ease-in-out infinite;
            pointer-events: none;
        }

        .icon1 { top: 18%; left: 10%; animation-delay: 0s; }
        .icon2 { top: 32%; right: 12%; animation-delay: 4s; }
        .icon3 { bottom: 25%; left: 14%; animation-delay: 8s; }
        .icon4 { top: 45%; right: 16%; animation-delay: 12s; }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%      { transform: translateY(-18px) rotate(2deg); }
        }

        .cta-button {
            display: inline-block;
            padding: 16px 52px;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: white;
            background: linear-gradient(135deg, #d4af37 0%, #e8c97e 50%, #d4af37 100%);
            border-radius: 60px;
            text-decoration: none;
            letter-spacing: 1.8px;
            box-shadow: 
                0 12px 40px rgba(212, 175, 55, 0.45),
                inset 0 2px 8px rgba(255,255,255,0.25);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            animation: fadeInUp 1.8s ease-out 1.4s forwards;
        }

        .cta-button:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 25px 70px rgba(212, 175, 55, 0.65),
                inset 0 2px 12px rgba(255,255,255,0.35);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .hero { padding: 0 8%; min-height: 900px; }
            .logo { font-size: clamp(2.8rem, 14vw, 5.5rem); }
            .title { font-size: clamp(2rem, 9vw, 3.8rem); }
            .subtitle { font-size: 1.25rem; }
            .cta-button { padding: 14px 48px; font-size: 1.2rem; }
            .floating-icon { width: 55px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <!-- Icônes fines, beige doré / champagne, très harmonieuses avec le fond -->
       
        <img src="https://i.pinimg.com/736x/9a/41/e2/9a41e2a598d074ca33b88a454cfab83e.jpg" class="floating-icon icon2" alt="Parfum">
        <img src="https://i.pinimg.com/736x/58/ac/09/58ac09828a82b1d781cb46b3638edf54.jpg" class="floating-icon icon3" alt="Rouge à lèvres">
       

        <div class="logo">Élégance</div>
        
        <h1 class="title">Découvrez l’élégance au féminin</h1>
        
        <p class="subtitle">
            Consultez les meilleurs articles de beauté, mode et accessoires pour femmes.
        </p>

        <a href="home" class="cta-button">
            Commencer
        </a>
    </section>

</body>
</html>
