<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Élégance</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- CSS principal -->
  <link rel="stylesheet" href="css/elegance.css">

  <style>
    /* ================================
       BASE HERO / LAYOUT
    ================================ */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(to bottom, #fffafc 0%, #fceceb 100%);
      overflow-x: hidden;
    }

    .app {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100vh;
      text-align: center;
      z-index: 1;
    }

    /* ================================
       HEADER / LOGO
    ================================ */
    .header {
      padding: 2rem 1rem 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #d4af37;
      text-transform: uppercase;
    }

    .logo .line {
      display: block;
      width: 50px;
      height: 2px;
      background: #d4af37;
      opacity: 0.6;
    }

    /* ================================
       HERO CONTENT
    ================================ */
    .hero {
      padding: 1rem 2rem;
      z-index: 10;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: #2c2a28;
      margin-bottom: 0.8rem;
      line-height: 1.2;
      text-shadow: 0 3px 15px rgba(212,175,55,0.15);
    }

    .hero h1 span {
      display: block;
      font-style: italic;
      color: #d4af37;
      font-weight: 400;
      font-size: 1.2rem;
      margin-top: 0.3rem;
    }

    .hero p {
      font-size: 1rem;
      color: #6e6b68;
      max-width: 320px;
      line-height: 1.5;
      margin-top: 0.5rem;
    }

    /* ================================
       CTA BUTTON
    ================================ */
    .cta {
      padding: 2rem 1rem 3rem;
      z-index: 10;
    }

    .btn-primary {
      display: inline-block;
      padding: 1.2rem 2rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: #fff;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #fceceb 0%, #d4af37 100%);
      box-shadow: 0 10px 30px rgba(212,175,55,0.4);
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 20px 50px rgba(212,175,55,0.5);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    /* ================================
       PRODUCTS / HERO VISUAL
    ================================ */
    .products {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .products .fabric {
      position: absolute;
      width: 120%;
      height: 100%;
      background: radial-gradient(circle at 50% 80%, rgba(255,255,255,0.3), transparent 70%);
      filter: blur(50px);
      transform: rotate(-10deg);
      bottom: 0;
    }

    .products .product {
      position: absolute;
      width: 80px;
      height: 80px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      bottom: 0;
      opacity: 0.95;
      transition: transform 0.3s ease;
    }

    .products .bag { left: 15%; background-image: url('../images/bag.png'); transform: rotate(-5deg); }
    .products .perfume { left: 35%; background-image: url('../images/perfume.png'); transform: rotate(3deg); }
    .products .lipstick { left: 55%; background-image: url('../images/lipstick.png'); transform: rotate(-2deg); }
    .products .brush { left: 70%; background-image: url('../images/brush.png'); transform: rotate(4deg); }
    .products .pearls { left: 80%; background-image: url('../images/pearls.png'); transform: rotate(-3deg); }
    .products .sunglasses { left: 90%; background-image: url('../images/sunglasses.png'); transform: rotate(2deg); }

    .products .product:hover {
      transform: translateY(-5px) scale(1.05);
    }

    /* ================================
       RESPONSIVE DESIGN
    ================================ */
    @media (min-width: 768px) {
      .hero h1 {
        font-size: 3.5rem;
      }
      .hero p {
        font-size: 1.1rem;
        max-width: 400px;
      }
      .btn-primary {
        font-size: 1.2rem;
        padding: 1.4rem 2.5rem;
      }
      .products .product {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="line"></span>
        <span>Élégance</span>
        <span class="line"></span>
      </div>
    </header>

    <section class="hero">
      <h1>
        Découvrez l’élégance
        <span>au féminin</span>
      </h1>
      <p>
        Consultez les meilleurs articles de beauté,<br>
        mode et accessoires pour femmes.
      </p>
    </section>

    <section class="cta">
      <a href="login.jsp" class="btn-primary">Commencer</a>
    </section>
  </div>

  <div class="products">
    <div class="fabric"></div>
    <div class="product bag"></div>
    <div class="product perfume"></div>
    <div class="product lipstick"></div>
    <div class="product brush"></div>
    <div class="product pearls"></div>
    <div class="product sunglasses"></div>
  </div>
</body>
</html>
