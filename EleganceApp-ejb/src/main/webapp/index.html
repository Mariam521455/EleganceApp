<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Élégance • L'art de se sublimer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Lato:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:          #fdf9f8;
      --rose-pale:   #fceef0;
      --beige-rose:  #f8e8e5;
      --gold-soft:   #e8d4a0;
      --gold:        #d4af37;
      --gold-dark:   #b89b3a;
      --text-dark:   #3a2a24;
      --text-soft:   #7a6a64;
      --white-warm:  #fffdfa;
      --radius-pill: 9999px;
      --transition:  all 0.55s cubic-bezier(0.23, 1, 0.32, 1);
      --shadow-soft: 0 12px 40px rgba(212,175,55,0.12);
      --shadow-hover:0 24px 68px rgba(212,175,55,0.26);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Lato', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* Fond bokeh doux & lumineux */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(252,236,235,0.7) 0%, transparent 30%),
        radial-gradient(circle at 80% 70%, rgba(248,232,229,0.6) 0%, transparent 35%),
        radial-gradient(circle at 50% 50%, rgba(232,212,160,0.12) 0%, transparent 40%);
      pointer-events: none;
      z-index: -2;
    }

    .app {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
      padding: 2rem 1.5rem;
      z-index: 1;
    }

    /* Header / Logo chic */
    header {
      padding: 2.5rem 0 1rem;
      z-index: 10;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
    }

    .logo-line {
      width: 60px;
      height: 1.5px;
      background: var(--gold);
      opacity: 0.5;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 4.2rem);
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Hero section */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1rem 2rem;
      z-index: 10;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 9vw, 5.2rem);
      font-weight: 600;
      line-height: 1.12;
      color: var(--text-dark);
      margin-bottom: 0.8rem;
      letter-spacing: -0.5px;
    }

    .hero h1 span {
      display: block;
      font-style: italic;
      font-weight: 400;
      color: var(--gold);
      font-size: 0.72em;
      margin-top: 0.4rem;
    }

    .hero p {
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      color: var(--text-soft);
      max-width: 520px;
      line-height: 1.68;
      margin: 1.2rem auto 2.8rem;
    }

    /* CTA bouton ultra-premium */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 3.2rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: white;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      border: none;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-soft);
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .cta-btn:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-hover);
    }

    .cta-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -100%;
      width: 60%;
      height: 200%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.35),
        transparent
      );
      transition: left 0.9s ease;
    }

    .cta-btn:hover::after {
      left: 100%;
    }

    /* Composition visuelle produits */
    .visual-compo {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .product {
      position: absolute;
      bottom: 0;
      width: 140px;
      height: 140px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.92;
      transition: transform 0.7s var(--ease-dreamy);
    }

    .product:hover {
      transform: translateY(-18px) scale(1.08);
    }

    .bag       { left: 12%; background-image: url('https://images.unsplash.com/photo-1584917865446-3d2a8a0b3c7f?w=300'); transform: rotate(-6deg); }
    .perfume   { left: 32%; background-image: url('https://images.unsplash.com/photo-1615397349754-cfa2066a298e?w=300'); transform: rotate(4deg); }
    .lipstick  { left: 52%; background-image: url('https://images.unsplash.com/photo-1625772299848-361b803ffa25?w=300'); transform: rotate(-3deg); }
    .brush     { left: 68%; background-image: url('https://images.unsplash.com/photo-1625772299848-361b803ffa25?w=300'); transform: rotate(5deg); }
    .pearls    { left: 84%; background-image: url('https://images.unsplash.com/photo-1611590027211-b954fd027b51?w=300'); transform: rotate(-2deg); }

    /* Responsive */
    @media (max-width: 768px) {
      .hero h1 { font-size: 3.2rem; }
      .hero p  { font-size: 1.05rem; max-width: 90%; }
      .product { width: 100px; height: 100px; }
      .bag     { left: 8%; }
      .perfume { left: 28%; }
      .lipstick{ left: 48%; }
      .brush   { left: 68%; }
      .pearls  { left: 82%; }
    }

    @media (max-width: 480px) {
      .logo-text { font-size: 2.8rem; }
      .logo-line { width: 40px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrapper">
        <span class="logo-line"></span>
        <span class="logo-text">Élégance</span>
        <span class="logo-line"></span>
      </div>
    </header>

    <section class="hero">
      <h1>
        Découvrez l’élégance
        <span>au féminin</span>
      </h1>
      <p>
        Consultez les meilleurs articles de beauté,<br>
        mode et accessoires pour femmes.
      </p>
    </section>

    <section class="cta">
      <a href="home" class="cta-btn">Commencer</a>
    </section>
  </div>

  <!-- Composition visuelle produits premium -->
  <div class="visual-compo">
    <div class="product bag"></div>
    <div class="product perfume"></div>
    <div class="product lipstick"></div>
    <div class="product brush"></div>
    <div class="product pearls"></div>
  </div>
</body>
</html>
